<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#ff7d58" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="破冰小程序" />
  <meta name="format-detection" content="telephone=no" />
  <title>SayHi | 初见面破冰小助手</title>
  <link rel="manifest" href="./app.webmanifest" />
  <link rel="apple-touch-icon" href="./assets/cat-soft.gif" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700&family=ZCOOL+KuaiLe&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="page-shell">
    <div class="drawer-scrim" id="drawerScrim" hidden></div>
    <main class="app-card">
      <section class="hero-panel">
        <div class="title-wrap">
          <h1><span class="title-pill">SayHi</span><span class="title-pill">见面破冰小助手</span></h1>
        </div>

        <div class="stage">
          <div class="speech-bubble" id="speechBubble">
            <span id="speechText">点点猫猫，我来给你抽一组适合破冰的开场白。</span>
          </div>

          <button class="cat-stage is-idle" id="catButton" type="button" aria-label="点击猫猫随机抽取情话">
            <span class="spark spark-a"></span>
            <span class="spark spark-b"></span>
            <span class="spark spark-c"></span>
            <img id="catImage" src="./assets/cat-neutral.gif" alt="SayHi 猫猫角色" />
          </button>

          <div class="reading-text" id="readingText" aria-live="polite"></div>

          <div class="floating-candidate-list" id="candidateList"></div>

          <div class="floating-actions">
            <button class="secondary-btn draw-floating-btn" id="drawButton" type="button">重新抽 3 句</button>
          </div>

          <button class="drawer-toggle" id="drawerToggle" type="button" aria-expanded="false" aria-controls="settingsDrawer">
            打开设置
          </button>
        </div>
      </section>

      <aside class="library-panel" id="settingsDrawer">
        <div class="drawer-handle-wrap">
          <span class="drawer-handle"></span>
        </div>
        <div class="drawer-close-row">
          <button class="drawer-close-btn" id="drawerCloseButton" type="button">收回设置</button>
        </div>
        <form class="composer" id="phraseForm">
          <label for="customPhrase">写入一条新的情话存档</label>
          <textarea
            id="customPhrase"
            name="customPhrase"
            rows="4"
            maxlength="100"
            placeholder="例如：你好，我本来只想礼貌打个招呼，结果看到你就想顺便心动一下。"
          ></textarea>

          <label for="customMood">这句更像哪种语气</label>
          <select id="customMood" name="customMood">
            <option value="soft">温柔甜一点</option>
            <option value="playful">搞笑轻松一点</option>
            <option value="bold">直球上头一点</option>
          </select>

          <button class="primary-btn" type="submit">加入我的招呼库</button>
        </form>

        <form class="composer" id="catForm">
          <label for="catFile">上传形象素材</label>
          <input id="catFile" name="catFile" type="file" accept="image/*,.gif" />
          <button class="primary-btn" type="submit">保存为新形象</button>
        </form>

        <div class="library-block">
          <div class="library-head">
            <h3>形象素材库</h3>
            <span id="catAssetCount">0 个</span>
          </div>
          <div class="saved-list" id="catAssetList"></div>
        </div>

        <div class="library-block">
          <div class="library-head">
            <h3>音色选择</h3>
            <span id="voiceStatus">准备中</span>
          </div>
          <div class="voice-picker">
            <label for="voicePresetSelect">选择猫猫声线</label>
            <select id="voicePresetSelect" name="voicePresetSelect"></select>
          </div>
          <p class="voice-preset-hint" id="voicePresetHint"></p>
        </div>
      </aside>
    </main>
  </div>

  <template id="candidateTemplate">
    <button class="candidate-bubble" type="button">
      <span class="candidate-text"></span>
    </button>
  </template>

  <template id="catAssetTemplate">
    <article class="saved-item">
      <div class="saved-main">
        <div class="asset-preview-wrap">
          <img class="asset-preview" alt="猫猫素材预览" />
        </div>
        <p class="asset-name"></p>
      </div>
      <button class="delete-btn" type="button">删除</button>
    </article>
  </template>

  <script src="./app.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./sw.js").catch(() => {});
      });
    }
  </script>
</body>
</html>
